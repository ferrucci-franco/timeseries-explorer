name: Release Full Desktop

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-build-release:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm.cmd ci

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $packageVersion = node -p "require('./package.json').version"
          $expectedTag = "v$packageVersion"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Tag $env:GITHUB_REF_NAME does not match package version $packageVersion"
          }

      - name: Run release test suite
        run: npm.cmd run test:release

      - name: Audit production dependencies for critical vulnerabilities
        run: npm.cmd audit --omit=dev --audit-level=critical

      - name: Build Windows x64 installer and portable app
        run: npm.cmd run desktop:dist:x64

      - name: Inspect packaged runtime
        run: npm.cmd run desktop:verify-package

      - name: Generate SHA-256 checksums
        run: npm.cmd run desktop:checksums

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: time-series-explorer-${{ github.ref_name }}-windows-x64
          path: |
            desktop-dist/*.exe
            desktop-dist/SHA256SUMS.txt
          if-no-files-found: error

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem -LiteralPath desktop-dist -File |
            Where-Object { $_.Extension -eq '.exe' -or $_.Name -eq 'SHA256SUMS.txt' } |
            ForEach-Object { $_.FullName }
          if ($assets.Count -ne 3) {
            throw "Expected two executables and SHA256SUMS.txt; found $($assets.Count) files"
          }
          $notesPath = "docs/releases/$($env:GITHUB_REF_NAME).md"
          if (-not (Test-Path -LiteralPath $notesPath)) {
            throw "Missing release notes: $notesPath"
          }
          $arguments = @(
            'release', 'create', $env:GITHUB_REF_NAME,
            '--verify-tag',
            '--title', "Time Series Explorer $env:GITHUB_REF_NAME",
            '--notes-file', $notesPath
          )
          if ($env:GITHUB_REF_NAME -match '-') { $arguments += '--prerelease' }
          $arguments += $assets
          & gh @arguments
